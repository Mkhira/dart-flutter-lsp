name: validate

# Static validation only — this plugin has nothing to compile. Keeps the repo
# submission-ready: manifest/marketplace validation, JSON well-formedness,
# shell launcher linting, and executable-bit assertions.

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- JSON well-formedness (runs even if the CLI step is unavailable) ---
      - name: JSON well-formedness
        run: |
          set -euo pipefail
          for f in \
            .claude-plugin/marketplace.json \
            dart-flutter-lsp/.claude-plugin/plugin.json \
            dart-flutter-lsp/.lsp.json ; do
            echo "checking $f"
            jq . "$f" > /dev/null
          done

      # --- Shell launcher linting ---
      # Pin shellcheck to the current release (0.11.0) rather than the older
      # apt version. This is the version the launchers are validated against and
      # keeps default severity ("treat findings as errors") — the older apt
      # build flags a retired info check (SC2015) on an intentional
      # `A && B || true` idiom in the launchers. This is a CI tool pin, not a
      # distribution installer.
      - name: Install shellcheck (pinned v0.11.0)
        run: |
          set -euo pipefail
          ver="v0.11.0"
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/${ver}/shellcheck-${ver}.linux.x86_64.tar.xz" -o /tmp/shellcheck.tar.xz
          tar -xJf /tmp/shellcheck.tar.xz -C /tmp
          sudo install "/tmp/shellcheck-${ver}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      - name: bash -n (syntax) + shellcheck
        run: |
          set -euo pipefail
          scripts="
            dart-flutter-lsp/bin/dart-lsp
            dart-flutter-lsp/bin/dart-lsp-healthcheck
            dart-flutter-lsp/bin/dart-lsp-selftest
          "
          for s in $scripts; do
            echo "== $s =="
            bash -n "$s"
            shellcheck "$s"
          done

      # --- Executable-bit assertion (catches a lost +x before release) ---
      - name: Assert launchers are mode 100755
        run: |
          set -euo pipefail
          expected="
            dart-flutter-lsp/bin/dart-lsp
            dart-flutter-lsp/bin/dart-lsp-healthcheck
            dart-flutter-lsp/bin/dart-lsp-selftest
          "
          fail=0
          for f in $expected; do
            mode="$(git ls-files -s "$f" | awk '{print $1}')"
            if [ "$mode" != "100755" ]; then
              echo "::error file=$f::expected mode 100755 but found '${mode:-<untracked>}'"
              fail=1
            else
              echo "ok: $f is 100755"
            fi
          done
          exit $fail

      # --- Claude Code CLI manifest + marketplace validation ---
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate plugin (strict — fail on warnings)
        run: claude plugin validate ./dart-flutter-lsp --strict
