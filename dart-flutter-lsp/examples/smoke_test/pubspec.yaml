name: dart_flutter_lsp_smoke_test
description: >-
  A tiny, dependency-free Dart package used to smoke-test the dart-flutter-lsp
  plugin. It contains one clean file (for hover / go-to-definition / references)
  and one intentionally-broken file (for diagnostics).
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"
